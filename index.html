<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro de Asistencia - INCUBALAB 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .bg-brand-orange { background-color: #EC7700; }
        .text-brand-orange { color: #EC7700; }
        .border-brand-orange { border-color: #EC7700; }
        .focus-ring-brand:focus { box-shadow: 0 0 0 3px rgba(236, 119, 0, 0.3); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Elementos decorativos de fondo -->
    <div class="absolute top-0 right-0 -mr-20 -mt-20 w-80 h-80 rounded-full bg-brand-orange opacity-10 blur-3xl"></div>
    <div class="absolute bottom-0 left-0 -ml-20 -mb-20 w-96 h-96 rounded-full bg-brand-orange opacity-10 blur-3xl"></div>

    <div class="w-full max-w-lg bg-white rounded-2xl shadow-xl z-10 overflow-hidden border border-gray-100">
        
        <!-- Header -->
        <div class="bg-brand-orange p-6 text-center">
            <h1 class="text-2xl font-bold text-white mb-1">Registro de Asistencia</h1>
            <p class="text-orange-100 text-sm">Programa de Fortalecimiento Exponencial</p>
        </div>

        <!-- Formulario -->
        <form id="attendanceForm" class="p-8 space-y-6">
            
            <!-- Nombre y Apellidos (Grid) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="space-y-2">
                    <label for="nombre" class="text-sm font-semibold text-gray-700 block">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required placeholder="Ej. Juan" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-brand-orange focus-ring-brand transition-all bg-gray-50 focus:bg-white text-gray-800">
                </div>
                <div class="space-y-2">
                    <label for="apellido" class="text-sm font-semibold text-gray-700 block">Apellidos</label>
                    <input type="text" id="apellido" name="apellido" required placeholder="Ej. Pérez" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-brand-orange focus-ring-brand transition-all bg-gray-50 focus:bg-white text-gray-800">
                </div>
            </div>

            <!-- Emprendimiento -->
            <div class="space-y-2">
                <label for="emprendimiento" class="text-sm font-semibold text-gray-700 block">Nombre del Emprendimiento</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4" />
                        </svg>
                    </div>
                    <input type="text" id="emprendimiento" name="emprendimiento" required placeholder="Ej. INSULINAPRO" class="w-full pl-11 pr-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-brand-orange focus-ring-brand transition-all bg-gray-50 focus:bg-white text-gray-800">
                </div>
            </div>

            <!-- Selección de Sesión -->
            <div class="space-y-2">
                <label for="sesion" class="text-sm font-semibold text-gray-700 block">¿A qué sesión asistes hoy?</label>
                <div class="relative">
                    <select id="sesion" name="sesion" required class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:border-brand-orange focus-ring-brand transition-all bg-gray-50 focus:bg-white text-gray-800 appearance-none">
                        <option value="" disabled selected>Selecciona una sesión...</option>
                        <option value="Sesión 0: Inducción">Sesión 0: Inducción (20 Marzo)</option>
                        <option value="Sesión 1: Entendimiento del sector salud">Sesión 1: Entendimiento del sector (24 Marzo)</option>
                        <option value="Sesión 2: Modelo de negocio">Sesión 2: Modelo de negocio (9 Abril)</option>
                        <option value="Sesión 3: Planificación Estratégica">Sesión 3: Planificación Estratégica (16 Abril)</option>
                        <option value="Sesión 4: Validación de mercado">Sesión 4: Validación de mercado (30 Abril)</option>
                        <option value="Sesión 5: Marketing y ventas">Sesión 5: Marketing y ventas (Abril)</option>
                        <option value="Sesión 6: Modelo Financiero I">Sesión 6: Modelo Financiero I (7 Mayo)</option>
                        <option value="Sesión 7: Modelo Financiero II">Sesión 7: Modelo Financiero II (14 Mayo)</option>
                        <option value="Sesión 8: Formalización y aspectos tributarios">Sesión 8: Formalización tributaria (21 Mayo)</option>
                        <option value="Sesión 9: Derecho laboral y contratación">Sesión 9: Derecho laboral (28 Mayo)</option>
                        <option value="Sesión 10: Propiedad Intelectual">Sesión 10: Propiedad Intelectual (4 Junio)</option>
                        <option value="Sesión 11: Mecanismos de financiación">Sesión 11: Financiación (9 Junio)</option>
                        <option value="Sesión 12: Preparación de pitch">Sesión 12: Preparación pitch (11 Junio)</option>
                        <option value="Sesión 13: Demo Day">Sesión 13: Demo Day (18 Junio)</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-700">
                        <svg class="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                    </div>
                </div>
            </div>

            <!-- Botón Enviar -->
            <button type="submit" id="submitBtn" class="w-full bg-brand-orange text-white font-bold py-3 px-4 rounded-lg shadow-md hover:bg-orange-600 hover:shadow-lg transition-all focus:outline-none focus:ring-4 focus:ring-brand-orange focus:ring-opacity-50 flex justify-center items-center">
                <span>Registrar Asistencia</span>
                <!-- Spinner Oculto -->
                <svg id="spinner" class="animate-spin ml-2 h-5 w-5 text-white hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
            </button>

            <!-- Mensajes de estado -->
            <div id="successMessage" class="hidden text-green-600 text-center font-semibold text-sm mt-4 bg-green-50 p-3 rounded-lg border border-green-200">
                ¡Asistencia registrada correctamente! Puedes cerrar esta ventana.
            </div>
            <div id="errorMessage" class="hidden text-red-600 text-center font-semibold text-sm mt-4 bg-red-50 p-3 rounded-lg border border-red-200">
                Hubo un error al guardar. Por favor, intenta de nuevo.
            </div>
        </form>

        <!-- Footer -->
        <div class="bg-gray-50 px-8 py-4 border-t border-gray-100 text-center">
            <p class="text-xs text-gray-500">Programa de Fortalecimiento Exponencial - HUB iEX</p>
        </div>

    </div>

    <!-- Script de conexión a Google Sheets -->
    <script>
        // PEGAR AQUÍ LA URL DEL SCRIPT DE GOOGLE QUE CREAREMOS:
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbweb0a6EKmlw_3e-IN8hWiWpLvBrsXw4AF7pOTbXhzdiyWmBEm64TGxs9TlgsPchXMW/exec'; 

        const form = document.getElementById('attendanceForm');
        const submitBtn = document.getElementById('submitBtn');
        const spinner = document.getElementById('spinner');
        const successMessage = document.getElementById('successMessage');
        const errorMessage = document.getElementById('errorMessage');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Si la URL no está configurada, mostramos un aviso en local
            if(SCRIPT_URL === 'URL_DE_GOOGLE_APPS_SCRIPT_AQUI') {
                alert('La conexión con Excel/Google Sheets aún no está configurada. Sigue las instrucciones del chat para completarlo.');
                return;
            }

            // Cambiar estado del botón
            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-75', 'cursor-not-allowed');
            spinner.classList.remove('hidden');
            successMessage.classList.add('hidden');
            errorMessage.classList.add('hidden');

            try {
                const formData = new FormData(form);
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: formData,
                    mode: 'no-cors'
                });

                // Con 'no-cors', la respuesta es "opaca" (no podemos leer response.ok),
                // pero si la petición no falló por red (catch), asumimos que llegó a Google.
                form.reset();
                successMessage.classList.remove('hidden');
                
            } catch (error) {
                console.error('Error!', error.message);
                errorMessage.classList.remove('hidden');
            } finally {
                // Restaurar botón
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-75', 'cursor-not-allowed');
                spinner.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
